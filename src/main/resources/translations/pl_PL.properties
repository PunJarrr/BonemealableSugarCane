command.help=&8[&6&lBonemealable Sugarcane&8]&r\n&7  /&f{label} reload  &8- &7Przeładuj wszystkie konfiguracje & tłumaczenia\n&7  /&f{label} version &8- &7Wyświetl wersję wtyczki\n&7  /&f{label} info    &8- &7Wyświetl informacje o wtyczce

# /bsc reload
command.reload.success=&aWszystkie konfiguracje zostały przeładowane!
