command.help=&8[&6&lBonemealable Sugarcane&8]&r\n&7  /&f{label} reload  &8- &7Lataa kaikki asetukset & käännökset uudelleen\n&7  /&f{label} version &8- &7Näytä lisäosan versio\n&7  /&f{label} info    &8- &7Näytä lisäosan tiedot

# /bsc reload
command.reload.success=&aKaikki asetukset ladattu uudelleen!
command.reload.failed=&cAsetusten uudelleenlataus epäonnistui. Tarkista konsoli.

# /bsc version
command.version=&8[&6&lBonemealable Sugarcane&8]&r &7v&f{version}

# /bsc info
command.info.line=&8-----------------------------------------------------
command.info.title=&6&l{name} &7v&f{version}
